name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Git on Windows may not carry the executable bit for gradlew.
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build & unit-test
        run: ./gradlew assembleDebug test --stacktrace
