name: Release

# Cut a release by pushing a semver tag, e.g.  git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload the APK
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Derive version from tag
        id: v
        run: |
          NAME="${GITHUB_REF_NAME#v}"                 # v1.2.3 -> 1.2.3
          BASE="${NAME%%-*}"                          # drop any -suffix for the numeric code
          IFS='.' read -r MAJ MIN PAT <<< "$BASE"
          CODE=$(( ${MAJ:-0} * 10000 + ${MIN:-0} * 100 + ${PAT:-0} ))
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Building Baton $NAME (versionCode $CODE)"

      - name: Materialise release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          {
            echo "storeFile=$RUNNER_TEMP/release.keystore"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build signed release APK
        run: >
          ./gradlew assembleRelease
          -Pbaton.versionName=${{ steps.v.outputs.name }}
          -Pbaton.versionCode=${{ steps.v.outputs.code }}
          --stacktrace

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Baton ${{ steps.v.outputs.name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk
